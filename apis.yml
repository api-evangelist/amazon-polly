name: Amazon Polly
description: Amazon Polly is a cloud service that converts text into lifelike speech, enabling you to create applications that talk and build entirely new categories of speech-enabled products. Polly 
  supports multiple voices, languages, and audio output formats including neural and generative engines for natural-sounding speech.
